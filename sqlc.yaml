version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries/"
    schema: "db/schema/"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/db"
        emit_interface: true
        emit_exact_table_names: true
        overrides:
          - db_type: "datetime"
            go_type: "time.Time"
