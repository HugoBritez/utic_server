<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UTIC Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm mx-4">
    <h1 class="text-2xl font-bold text-center mb-8">UTIC Admin</h1>

    <form method="POST" action="/admin/login" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Usuario</label>
        <input type="text" name="username" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1">Contraseña</label>
        <input type="password" name="password" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>

      {{if .}}
      <p class="text-red-400 text-sm">{{.}}</p>
      {{end}}

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 rounded-lg px-4 py-2 text-sm font-medium transition">
        Ingresar
      </button>
    </form>
  </div>

</body>
</html>
